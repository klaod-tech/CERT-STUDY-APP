<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>필기 앱</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="app" class="app-layout" hidden>
    <aside id="sidebar" class="sidebar">
      <button id="collapse-toggle" class="collapse-toggle">☰</button>
      <ul id="category-list" class="category-list"></ul>
      <button id="add-category-btn" class="add-category-btn">+</button>
    </aside>

    <section id="panel" class="panel">
      <div class="tabs">
        <button class="tab-btn active" data-tab="notes">필기</button>
        <button class="tab-btn" data-tab="quizzes">문제풀이</button>
        <button class="tab-btn" data-tab="concepts">핵심개념</button>
      </div>
      <div class="progress-count" id="progress-count"></div>
      <ul id="item-list" class="item-list"></ul>
    </section>

    <main id="board" class="board">
      <div id="board-content"></div>
      <button id="add-item-btn" class="fab">+</button>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
